apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: prometheus
      initContainers:
        # Fetch the MaxMind GeoLite2 Country DB from a public mirror so the
        # promtail geoip stage can resolve client IPs to a country code.
        - name: fetch-geoip-db
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - "curl -fsSL -o /geoip/GeoLite2-City.mmdb https://raw.githubusercontent.com/P3TERX/GeoLite.mmdb/download/GeoLite2-City.mmdb"
          volumeMounts:
            - name: geoip
              mountPath: /geoip
      containers:
        - name: promtail
          image: grafana/promtail:latest
          args:
            - "-config.file=/mnt/config/promtail-config.yml"
          ports:
            - name: promtail
              containerPort: 9080
          env: 
          - name: 'HOSTNAME'
            valueFrom:
              fieldRef:
                fieldPath: 'spec.nodeName'
          volumeMounts:
            - name: varlog
              mountPath: /var/log
            - name: promtail-config
              mountPath: /mnt/config
            - name: promtail-storage
              mountPath: /var/lib/promtail
            - name: geoip
              mountPath: /etc/promtail/geoip
              readOnly: true
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: promtail-config
          configMap:
            name: promtail-config
        - name: promtail-storage
          persistentVolumeClaim:
            claimName: promtail-storage
        - name: geoip
          emptyDir: {}

