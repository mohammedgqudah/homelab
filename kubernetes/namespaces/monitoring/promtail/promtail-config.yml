server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /var/lib/promtail/positions.yaml

clients:
  - url: http://loki.default.svc.cluster.local/loki/api/v1/push

scrape_configs:
  - job_name: system
    static_configs:
      - targets:
          - node
        labels:
          job: varlogs
          __path__: /var/log/*log

  - job_name: pod-logs
    kubernetes_sd_configs:
      - role: pod
    pipeline_stages:
      - cri: {}
      # Geo-enrich ingress-nginx access logs: extract the client IP and resolve
      # it to a country code so Grafana can plot a visitor map. Scoped to the
      # ingress controller only to keep label cardinality low (one label,
      # geoip_country_code, ~number of countries).
      - match:
          selector: '{namespace="ingress-nginx", container="controller"}'
          stages:
            - regex:
                expression: '^(?P<remote_addr>\S+)'
            - geoip:
                db: "/etc/promtail/geoip/GeoLite2-City.mmdb"
                source: "remote_addr"
                db_type: "city"
            - labels:
                geoip_country_name:
    relabel_configs:
      - source_labels:
          - __meta_kubernetes_pod_node_name
        target_label: __host__
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)
      - action: replace
        replacement: $1
        separator: /
        source_labels:
          - __meta_kubernetes_namespace
          - __meta_kubernetes_pod_name
        target_label: job
      - action: replace
        source_labels:
          - __meta_kubernetes_namespace
        target_label: namespace
      - action: replace
        source_labels:
          - __meta_kubernetes_pod_name
        target_label: pod
      - action: replace
        source_labels:
          - __meta_kubernetes_pod_container_name
        target_label: container
      - replacement: /var/log/pods/*$1/*.log
        separator: /
        source_labels:
          - __meta_kubernetes_pod_uid
          - __meta_kubernetes_pod_container_name
        target_label: __path__
