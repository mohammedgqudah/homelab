apiVersion: 1

datasources:
  - name: prometheus
    type: prometheus
    access: proxy
    url: 'http://prometheus.default.svc.cluster.local'
    basicAuth: false
    uid: prometheus

  - name: Alertmanager
    type: alertmanager
    url: 'http://alertmanager.default.svc.cluster.local'
    access: proxy
    uid: alertmanager
    jsonData:
      implementation: prometheus
      handleGrafanaManagedAlerts: false
    basicAuth: false

  - name: Loki
    type: loki
    access: proxy
    url: 'http://loki.default.svc.cluster.local'
    uid: loki
    basicAuth: false
