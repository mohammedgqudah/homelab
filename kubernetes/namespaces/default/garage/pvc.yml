apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: garage-meta
  labels:
    app: garage
spec:
  storageClassName: nfs-client
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 3Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: garage-data
  labels:
    app: garage
spec:
  storageClassName: nfs-client
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
